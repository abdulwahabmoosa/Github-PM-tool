services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmaster-postgres
    environment:
      POSTGRES_USER: taskmaster
      POSTGRES_PASSWORD: taskmaster_dev
      POSTGRES_DB: taskmaster
    ports:
      - "5432:5432"
    volumes:
      - taskmaster_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmaster -d taskmaster"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  taskmaster_pgdata:
